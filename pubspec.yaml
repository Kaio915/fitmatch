name: fitmatch
description: "FitMatch App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  http_parser: ^4.1.2

  # Foto (Web: escolher arquivo / Mobile: câmera)
  image_picker: ^1.1.2

  # Máscara CPF
  mask_text_input_formatter: ^2.9.0

  # Persistência local
  shared_preferences: ^2.3.3

  # PDF e impressão/download
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
